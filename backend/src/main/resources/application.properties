spring.application.name=app

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/myapp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# CORS — allow the Vite dev server
spring.web.cors.allowed-origins=http://localhost:5173

# Scheduling
spring.task.scheduling.pool.size=2

# Screenshot storage (relative to where you run the backend)
screenshot.storage.path=./screenshots

# How many top news sites to keep in the DB (from Wikipedia rankings)
sources.sync.count=3
